<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Risiko — Pocket Objectives</title>
    <meta name="description" content="A pocket-sized board to study the 16 official Italian Risiko tournament objectives.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                'gaming-dark': '#0c1420', 'gaming-darker': '#070d16',
                'gaming-gray': '#1d222c', 'gaming-light': '#2a303c',
                'gaming-accent': '#c89b3c', 'gaming-accent-dark': '#96701f',
            } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Alegreya+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        html, body { height: 100%; overscroll-behavior: none; }
        body { font-family: 'Alegreya Sans', sans-serif; background: #070d16; color: #fff;
               -webkit-tap-highlight-color: transparent; overflow: hidden; }
        h1, h2, h3, .font-display { font-family: 'Cinzel', serif; letter-spacing: 0.02em; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-effect { background: rgba(20, 18, 14, 0.92); backdrop-filter: blur(14px);
                        border: 1px solid rgba(200, 155, 60, 0.18); }
        .neon-gradient-text {
            background: linear-gradient(45deg, #f1d27d 0%, #c89b3c 55%, #8a5d1d 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        /* borderless menu icon — legible over any part of the map */
        #menu-btn { text-shadow: 0 1px 5px rgba(0,0,0,.95), 0 0 3px rgba(0,0,0,.95); }

        /* board card slide animation on swipe / step */
        #board-wrap { transition: transform .18s ease, opacity .18s ease; }
        #board-wrap.slide-left  { transform: translateX(-14%); opacity: 0; }
        #board-wrap.slide-right { transform: translateX( 14%); opacity: 0; }

        /* transient objective-name flash on change (no persistent UI) */
        #obj-toast { transition: opacity .35s ease; }

        /* drawer */
        #drawer { transition: transform .25s ease; transform: translateX(-100%); }
        #drawer.open { transform: translateX(0); }
        #scrim { transition: opacity .25s ease; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #96701f; border-radius: 3px; }
    </style>
</head>
<body class="selection:bg-gaming-accent selection:text-white">

    <!-- full-screen board (natural orientation, fills the screen, stays put) -->
    <div id="board-wrap" class="fixed inset-0 z-0">
        <div id="board2d" class="absolute inset-0"></div>
    </div>

    <!-- the ONLY persistent UI: a borderless menu icon, top-left, both orientations -->
    <button id="menu-btn" aria-label="Menu"
            class="fixed z-40 w-11 h-11 flex items-center justify-center text-3xl leading-none text-white active:text-gaming-accent"
            style="top: max(0.4rem, env(safe-area-inset-top)); left: max(0.4rem, env(safe-area-inset-left));">☰</button>

    <!-- transient objective name, flashes briefly on change then fades -->
    <div id="obj-toast" class="fixed top-0 left-0 right-0 z-10 flex justify-center pt-3 pointer-events-none opacity-0"
         style="padding-top: max(0.75rem, env(safe-area-inset-top));">
        <span class="glass-effect rounded-full pl-3 pr-4 py-1.5 inline-flex items-center gap-2">
            <span class="text-base">🎯</span>
            <span id="toast-name" class="font-bold text-sm"></span>
            <span id="toast-total" class="text-[11px] text-gaming-accent font-mono"></span>
        </span>
    </div>

    <!-- drawer + scrim (opened by the menu icon) -->
    <div id="scrim" class="fixed inset-0 z-30 bg-black/60 opacity-0 pointer-events-none"></div>
    <aside id="drawer" class="fixed top-0 left-0 bottom-0 z-40 w-[86%] max-w-sm glass-effect flex flex-col"
           style="padding-top: max(0.75rem, env(safe-area-inset-top));">
        <div class="px-4 pb-3 flex items-center justify-between border-b border-white/10">
            <h2 class="text-base font-bold neon-gradient-text" data-i18n="landing.title"></h2>
            <button id="drawer-close" aria-label="Close" class="w-9 h-9 flex items-center justify-center text-xl text-gray-400 active:text-white">✕</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-3 space-y-5">
            <!-- current objective: name + total + breakdown -->
            <div>
                <div class="flex items-baseline gap-2 mb-2">
                    <span class="text-lg">🎯</span>
                    <span id="cur-name" class="font-bold text-lg leading-tight"></span>
                    <span id="cur-total" class="text-xs text-gaming-accent font-mono ml-auto"></span>
                </div>
                <div id="cur-breakdown" class="space-y-3 text-sm"></div>
            </div>

            <!-- view mode -->
            <div>
                <div class="text-[11px] uppercase tracking-[0.2em] text-gray-400 font-mono mb-2" data-i18n="mobile.viewmode"></div>
                <div id="viewmode-list" class="grid grid-cols-2 gap-2"></div>
            </div>

            <!-- objectives -->
            <div>
                <div class="text-[11px] uppercase tracking-[0.2em] text-gray-400 font-mono mb-2" data-i18n="mobile.objectives"></div>
                <div id="obj-list" class="space-y-1"></div>
            </div>
        </div>

        <!-- footer: language + desktop link -->
        <div class="px-4 py-3 border-t border-white/10 space-y-3"
             style="padding-bottom: max(0.75rem, env(safe-area-inset-bottom));">
            <div class="flex items-center justify-between">
                <span class="text-[11px] uppercase tracking-[0.2em] text-gray-400 font-mono" data-i18n="mobile.language"></span>
                <div class="flex gap-1" data-langswitch></div>
            </div>
            <a id="desktop-link" href="index.html?desktop=1"
               class="block text-center glass-effect rounded-lg py-2 text-xs text-gaming-accent active:bg-white/10"
               data-i18n="mobile.desktop_link"></a>
        </div>
    </aside>

    <script type="module">
        import { createMobileBoard, MOBILE_VIEW_MODES } from './mobile_board.js';

        const LOCALES = ['en', 'it'];
        const LANG_KEY = 'risiko_study_locale';
        const MODE_LABEL = { standard: 'view_mode_default', clean: 'view_mode_clean',
                             outline: 'view_mode_outline', fill: 'view_mode_fill' };

        function currentLocale() {
            const s = localStorage.getItem(LANG_KEY);
            return LOCALES.includes(s) ? s : (navigator.language || '').startsWith('it') ? 'it' : 'en';
        }
        window.t = (key, params = {}) => {
            let text = (window.I18N && window.I18N[key]) || key;
            for (const name in params) text = text.replaceAll('{' + name + '}', params[name]);
            return text;
        };
        window.switchLanguage = (loc) => { localStorage.setItem(LANG_KEY, loc); location.reload(); };

        function applyI18n() {
            document.documentElement.lang = window.LOCALE;
            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = window.t(el.dataset.i18n));
            document.querySelectorAll('[data-langswitch]').forEach(box => {
                box.innerHTML = LOCALES.map(loc => `
                    <button onclick="switchLanguage('${loc}')"
                        class="px-2.5 py-1 text-[11px] font-bold rounded ${loc === window.LOCALE
                            ? 'bg-gaming-accent text-white'
                            : 'bg-gray-700/70 active:bg-gray-600 text-gray-300'}">${loc.toUpperCase()}</button>`).join('');
            });
        }

        // ── drawer open/close ────────────────────────────────────────────────
        const drawer = document.getElementById('drawer');
        const scrim  = document.getElementById('scrim');
        function openDrawer() { drawer.classList.add('open'); scrim.classList.remove('opacity-0', 'pointer-events-none'); }
        function closeDrawer() { drawer.classList.remove('open'); scrim.classList.add('opacity-0', 'pointer-events-none'); }
        document.getElementById('menu-btn').addEventListener('click', openDrawer);
        document.getElementById('drawer-close').addEventListener('click', closeDrawer);
        scrim.addEventListener('click', closeDrawer);

        const continentLabel = (en) => window.t('continent.' + en);

        // breakdown markup for the current objective (shown inside the drawer)
        function breakdownHTML(o) {
            if (!o) return '';
            const pts = window.t('objective.pts');
            let html = '';
            if (o.whole_continents && o.whole_continents.length) {
                html += `<div>
                    <div class="text-[11px] uppercase tracking-wide text-gray-400 mb-1">${window.t('study.whole')}</div>
                    <div class="space-y-1">` +
                    o.whole_continents.map(c => `
                        <div class="flex justify-between items-center bg-white/5 rounded px-2.5 py-1.5">
                            <span class="font-medium">${continentLabel(c.continent)}
                                <span class="text-[10px] text-gray-500">(${window.t('study.whole_tag')})</span></span>
                            <span class="font-mono text-gaming-accent">${c.value} ${pts}</span>
                        </div>`).join('') +
                    `</div></div>`;
            }
            if (o.bridges && o.bridges.length) {
                html += `<div>
                    <div class="text-[11px] uppercase tracking-wide text-gray-400 mb-1">${window.t('study.bridges')}</div>
                    <div class="space-y-1.5">` +
                    o.bridges.map(b => `
                        <div class="bg-white/5 rounded px-2.5 py-1.5">
                            <div class="text-[10px] text-gray-400 mb-1">${continentLabel(b.continent)}</div>
                            <div class="flex flex-wrap gap-1">` +
                            b.territories.map(tr => `
                                <span class="inline-flex items-center gap-1 bg-black/30 rounded px-1.5 py-0.5 text-[12px]">
                                    ${tr.name}<span class="font-mono text-gaming-accent">${tr.value}</span></span>`).join('') +
                            `</div></div>`).join('') +
                    `</div></div>`;
            }
            return html;
        }

        // transient name flash on objective change
        const toast = document.getElementById('obj-toast');
        let toastTimer = 0;
        function flashName(o) {
            if (!o) return;
            document.getElementById('toast-name').textContent = o.name;
            document.getElementById('toast-total').textContent = `${o.total} ${window.t('objective.pts')}`;
            toast.style.opacity = '1';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 1300);
        }

        let booted = false;
        function onSelect(o, mode) {
            // drawer's current-objective section
            document.getElementById('cur-name').textContent = o ? o.name : '';
            document.getElementById('cur-total').textContent = o ? `${o.total} ${window.t('objective.pts')}` : '';
            document.getElementById('cur-breakdown').innerHTML = breakdownHTML(o);
            // active states in the drawer
            document.querySelectorAll('#obj-list [data-obj]').forEach(el =>
                el.classList.toggle('bg-gaming-accent/25', o && +el.dataset.obj === o.id));
            document.querySelectorAll('#viewmode-list [data-mode]').forEach(el =>
                el.classList.toggle('bg-gaming-accent/25', el.dataset.mode === mode));
            if (booted) flashName(o);   // don't flash the initial auto-selection
        }

        // ── boot ──────────────────────────────────────────────────────────────
        (async function boot() {
            window.LOCALE = currentLocale();
            try { window.I18N = await fetch('./i18n/' + window.LOCALE + '.json').then(r => r.json()); }
            catch { window.I18N = {}; }
            applyI18n();

            const board = createMobileBoard({
                container: document.getElementById('board2d'),
                onSelect,
            });
            await board.ready;

            document.getElementById('viewmode-list').innerHTML = MOBILE_VIEW_MODES.map(m => `
                <button data-mode="${m}" class="glass-effect rounded-lg py-2 text-xs font-medium active:bg-white/10">
                    ${window.t(MODE_LABEL[m])}</button>`).join('');
            document.querySelectorAll('#viewmode-list [data-mode]').forEach(btn =>
                btn.addEventListener('click', () => board.setViewMode(btn.dataset.mode)));

            document.getElementById('obj-list').innerHTML = board.objectives.map(o => `
                <button data-obj="${o.id}"
                        class="w-full flex items-center justify-between rounded-lg px-3 py-2 text-left active:bg-white/10">
                    <span class="truncate"><span class="font-mono text-gray-500 text-xs mr-2">${o.id}</span>${o.name}</span>
                    <span class="font-mono text-[11px] text-gaming-accent shrink-0 ml-2">${o.total}</span>
                </button>`).join('');
            document.querySelectorAll('#obj-list [data-obj]').forEach(btn =>
                btn.addEventListener('click', () => { board.select(+btn.dataset.obj); closeDrawer(); }));

            onSelect(board.getSelected(), board.getViewMode());
            booted = true;

            // ── swipe = flip objectives like cards ────────────────────────────
            const wrap = document.getElementById('board-wrap');
            function flip(dir) {  // +1 next, -1 prev
                wrap.classList.add(dir > 0 ? 'slide-left' : 'slide-right');
                setTimeout(() => {
                    dir > 0 ? board.next() : board.prev();
                    wrap.classList.remove('slide-left', 'slide-right');
                }, 160);
            }
            let sx = 0, sy = 0, tracking = false;
            const board2d = document.getElementById('board2d');
            board2d.addEventListener('touchstart', e => {
                const t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY; tracking = true;
            }, { passive: true });
            board2d.addEventListener('touchend', e => {
                if (!tracking) return; tracking = false;
                const t = e.changedTouches[0], dx = t.clientX - sx, dy = t.clientY - sy;
                if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.3) flip(dx < 0 ? 1 : -1);
            }, { passive: true });
        })();
    </script>
</body>
</html>
